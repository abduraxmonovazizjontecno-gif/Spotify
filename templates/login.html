<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти в Spotify - Kenzi Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-base: #000000;
            --bg-card: #121212;
            --sp-blue: #2563eb;
            --sp-blue-hover: #3b82f6;
            --text-base: #ffffff;
            --text-subdued: #b3b3b3;
            --border-input: #727272;
            --border-input-focus: #ffffff;
        }

        body, .wrap {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Spotify Login Box Container */
        .card {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 48px 56px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        /* Logo Styling */
        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 32px;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-icon svg {
            fill: var(--sp-blue);
            filter: drop-shadow(0 0 10px rgba(37, 99, 235, 0.4));
        }

        .title-headline {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            letter-spacing: -1px;
            margin-bottom: 32px;
        }

        /* Form Controls */
        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .field label {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-base);
        }

        .field input {
            width: 100%;
            padding: 14px 16px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-input);
            border-radius: 4px;
            color: var(--text-base);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .field input:focus {
            border-color: var(--border-input-focus);
            box-shadow: 0 0 0 1px var(--border-input-focus);
        }

        .field input::placeholder {
            color: #757575;
        }

        /* Links and Extras */
        .forgot {
            margin-bottom: 28px;
            text-align: left;
        }

        .forgot a {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-base);
            text-decoration: underline;
        }

        .forgot a:hover {
            color: var(--sp-blue-hover);
        }

        /* Action Buttons */
        .btn-blue {
            width: 100%;
            background-color: var(--sp-blue);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            margin-bottom: 16px;
        }

        .btn-blue:hover {
            background-color: var(--sp-blue-hover);
            transform: scale(1.02);
        }

        .btn-blue:active {
            transform: scale(0.99);
        }

        .divider {
            border: 0;
            height: 1px;
            background-color: #292929;
            margin: 32px 0;
        }

        /* Register Area */
        .register-offer-row {
            text-align: center;
            font-size: 14px;
            color: var(--text-subdued);
            font-weight: 500;
        }

        .btn-register-link {
            color: var(--text-base);
            font-weight: 700;
            text-decoration: underline;
            margin-left: 4px;
        }

        .btn-register-link:hover {
            color: var(--sp-blue-hover);
        }

        #loginMsg {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin-top: 12px;
        }

        .terms {
            font-size: 11px;
            color: var(--text-subdued);
            text-align: center;
            line-height: 1.5;
            margin-top: 24px;
        }

        .terms a {
            color: var(--text-subdued);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="wrap">
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">
                <svg width="32" height="32" viewBox="0 0 24 24">
                    <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.783-8.893-.982-.336.075-.67-.136-.746-.472-.075-.336.136-.67.472-.746 3.854-.88 7.15-.507 9.82 1.13.295.178.387.563.207.863zm1.224-2.723c-.226.367-.707.487-1.074.26-2.72-1.672-6.87-2.157-10.08-1.182-.413.125-.847-.107-.972-.52-.125-.413.107-.847.52-.972 3.673-1.114 8.243-.574 11.35 1.334.366.226.486.707.26 1.073zm.106-2.833C14.384 8.71 8.563 8.52 5.175 9.548c-.522.158-1.076-.143-1.234-.665-.158-.522.143-1.076.665-1.234 3.884-1.18 10.31-.96 14.39 1.46.47.28.623.89.343 1.36-.28.47-.89.623-1.36.343z"/>
                </svg>
            </div>
            <span>Kenzi</span>
        </div>

        <h2 class="title-headline">Войти в Kenzi</h2>

        <div class="field">
            <label for="loginEmail">Email-адрес</label>
            <input type="email" placeholder="Email-адрес" id="loginEmail" autocomplete="username"/>
        </div>

        <div class="field">
            <label for="loginPass">Пароль</label>
            <input type="password" placeholder="Пароль" id="loginPass" autocomplete="current-password"/>
        </div>

        <div class="forgot">
            <a href="#">Забыли пароль?</a>
        </div>

        <button class="btn-blue" onclick="handleLogin()">Войти</button>

        <div id=\"loginMsg\"></div>

        <hr class="divider"/>

        <div class="register-offer-row">
            <span>Нет аккаунта?</span>
            <a href="{% url 'register' %}" class="btn-register-link">Зарегистрироваться в Kenzi</a>
        </div>

        <p class="terms">
            Продолжая, вы соглашаетесь с <a href="#">Условиями использования</a> и <a href="#">Политикой конфиденциальности</a>.
        </p>
    </div>
</div>

<script>
    function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const msg = document.getElementById('loginMsg');

        if (!email || !pass) {
            msg.style.color = '#ef4444';
            msg.textContent = 'Пожалуйста, заполните все поля.';
            return;
        }

        msg.style.color = '#1ed760';
        msg.textContent = 'Вход в систему...';
        // Bu erda sening API yoki form yuborish mantiqlaring ishlaydi
    }
</script>
</body>
</html>
